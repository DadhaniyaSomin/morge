[build]
command = "pnpm run build:client"
functions = "netlify/functions"
publish = "dist/spa"

[build.environment]
NODE_VERSION = "20"

[functions]
node_bundler = "esbuild"

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/api/:splat"
status = 200
force = true

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
